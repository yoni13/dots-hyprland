source=~/.config/hypr/hyprlock/colors.conf

# ── Background ────────────────────────────────────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    noise = 0.01
    contrast = 0.85
    brightness = 0.6
}

# ── Clock ─────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = $text_color
    font_size = 96
    font_family = $font_family_clock
    position = 0, 130
    halign = center
    valign = center
}

# ── Date ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] date +"%A, %B %d"
    color = $text_color
    font_size = 18
    font_family = $font_family_clock
    position = 0, 50
    halign = center
    valign = center
}

# ── Input field ───────────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.12
    dots_spacing = 0.3
    dots_center = true
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    placeholder_text = <span foreground="##ffffff55">enter password</span>
    fade_on_empty = true
    rounding = 26
    position = 0, -30
    halign = center
    valign = center
}

# ── User ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text =  $USER
    color = $text_color
    font_size = 15
    font_family = $font_family
    position = 0, 15
    halign = center
    valign = center
}

# ── Caps Lock warning ─────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = 0, -100
    halign = center
    valign = center
}

# ── Keyboard layout (bottom-right) ────────────────────────────────────────────
label {
    monitor =
    text = $LAYOUT
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = -30, 30
    halign = right
    valign = bottom
}

# ── Status / battery (top-left) ───────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = 30, -30
    halign = left
    valign = top
}
