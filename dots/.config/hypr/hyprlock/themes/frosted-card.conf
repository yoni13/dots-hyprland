source=~/.config/hypr/hyprlock/colors.conf

# Background
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 4
    noise = 0.10
    contrast = 1.28
    brightness = 0.18
}

# Top telemetry
label {
    monitor =
    text = AGENT_RUNTIME // HYPRLOCK
    color = rgba(f8ff4dff)
    font_size = 14
    font_family = $font_family
    position = 30, -30
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = rgba(00f6ffff)
    font_size = 14
    font_family = $font_family
    position = -30, -30
    halign = right
    valign = top
}

# Alert headline with chromatic offset
label {
    monitor =
    text = AGENTS IS RUNNING
    color = rgba(ff2bd6cc)
    font_size = 60
    font_family = $font_family_clock
    position = -5, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = AGENTS IS RUNNING
    color = rgba(00f6ffcc)
    font_size = 60
    font_family = $font_family_clock
    position = 5, 168
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:125] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/flash-agents.sh
    color = rgba(f8ff4dff)
    font_size = 60
    font_family = $font_family_clock
    position = 0, 164
    halign = center
    valign = center
}

label {
    monitor =
    text = //// //// //// //// //// //// //// //// ////
    color = rgba(00f6ff99)
    font_size = 15
    font_family = $font_family
    position = 0, 102
    halign = center
    valign = center
}

label {
    monitor =
    text = |||| |||| |||| |||| |||| |||| |||| |||| ||||
    color = rgba(ff2bd699)
    font_size = 15
    font_family = $font_family
    position = 0, 230
    halign = center
    valign = center
}

# Clock cluster
label {
    monitor =
    text = $TIME
    color = rgba(00f6ffff)
    font_size = 104
    font_family = $font_family_clock
    position = 0, 20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] date +"%A, %B %d"
    color = rgba(ff2bd6ff)
    font_size = 20
    font_family = $font_family_clock
    position = 0, -55
    halign = center
    valign = center
}

label {
    monitor =
    text = SECURE CONSOLE // AWAITING TOKEN
    color = rgba(f8ff4dcc)
    font_size = 13
    font_family = $font_family
    position = 0, -90
    halign = center
    valign = center
}

# Login controls
label {
    monitor =
    text = IDENTITY: $USER
    color = rgba(f8ff4dff)
    font_size = 14
    font_family = $font_family
    position = 0, -118
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 380, 62
    outline_thickness = 3
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(f8ff4dff)
    inner_color = rgba(090017f0)
    font_color = rgba(00f6ffff)
    placeholder_text = <span foreground="##00f6ffaa">ACCESS TOKEN</span>
    fade_on_empty = false
    rounding = 6
    position = 0, -162
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = rgba(ff2bd6ff)
    font_size = 13
    font_family = $font_family
    position = 0, -222
    halign = center
    valign = center
}

# Bottom telemetry
label {
    monitor =
    text = SESSION LOCKED // AGENT OPS ACTIVE
    color = rgba(ff2bd6ff)
    font_size = 13
    font_family = $font_family
    position = 30, 30
    halign = left
    valign = bottom
}

label {
    monitor =
    text = LAYOUT: $LAYOUT
    color = rgba(00f6ffff)
    font_size = 13
    font_family = $font_family
    position = -30, 30
    halign = right
    valign = bottom
}
